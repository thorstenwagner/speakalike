<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #2b2d31;
            color: #e0e0e0;
            overflow: hidden;
            user-select: none;
        }
        .item {
            display: flex;
            align-items: center;
            padding: 4px 10px;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.85rem;
            border-bottom: 1px solid #3f4147;
            height: 32px;
        }
        .item:last-child { border-bottom: none; }
        .item:hover { background: #35373d; }
        .badge {
            font-size: 0.6rem;
            padding: 1px 5px;
            border-radius: 3px;
            background: #3f4147;
            color: #a0a0a0;
            font-family: monospace;
            margin-right: 8px;
            flex-shrink: 0;
        }
        .text {
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>
    <div id="list"></div>
    <script>
        const KEYS = ['Q', 'E', 'T', 'U', 'I', 'Y', 'C', 'N'];
        const listEl = document.getElementById('list');

        function render(items) {
            listEl.innerHTML = '';
            items.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'item';
                const preview = item.text.length > 70 ? item.text.substring(0, 70) + '...' : item.text;
                div.innerHTML = `<span class="badge">Ctrl+⇧+${KEYS[i]}</span><span class="text">${preview}</span>`;
                div.addEventListener('click', () => {
                    window.electronAPI.quickAccessPlay(i);
                });
                listEl.appendChild(div);
            });
        }

        window.electronAPI.onUpdateItems((items) => {
            render(items);
        });
    </script>
</body>
</html>
